  <script>
    // ============================================
    // LOAD CHARTS ONE AT A TIME (won't hang)
    // ============================================
    
    // Helper to parse CSV
    function parseCSV(csvText) {
      const lines = csvText.trim().split('\n');
      const headers = lines[0].split(',');
      const data = [];
      for (let i = 1; i < lines.length; i++) {
        const values = lines[i].split(',');
        const row = {};
        for (let j = 0; j < headers.length; j++) {
          let val = values[j]?.trim();
          if (!isNaN(val) && val !== '') val = parseFloat(val);
          row[headers[j]] = val;
        }
        data.push(row);
      }
      return data;
    }
    
    // Chart 1-3: Trade (uses your working CSV)
    async function loadTradeCharts() {
      try {
        console.log("Loading trade data...");
        const response = await fetch('data/wiki_exports_cleaned.csv');
        const csvText = await response.text();
        const data = parseCSV(csvText);
        
        // Fix country names
        const mapData = data.map(d => ({
          country: d.country === 'United States' ? 'United States of America' :
                   d.country === 'Czech Republic' ? 'Czechia' : d.country,
          trade_value: d.trade_value
        }));
        
        // Chart 1: Choropleth
        const spec1 = {
          "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
          "title": {"text": "Global Textile Export Value", "color": "#f0f0f0", "subtitle": "Darker = higher exports", "subtitleColor": "#aaa"},
          "width": 800, "height": 450, "background": "#1a1a1a",
          "projection": {"type": "naturalEarth1"},
          "layer": [
            {"data": {"url": "https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson", "format": {"type": "json", "property": "features"}}, "mark": {"type": "geoshape", "fill": "#2a2a2a", "stroke": "#444"}},
            {"data": {"values": mapData}, "transform": [{"lookup": "country", "from": {"data": {"url": "https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson", "format": {"type": "json", "property": "features"}}, "key": "properties.NAME", "fields": ["geometry"]}}], "mark": {"type": "geoshape", "stroke": "#444"}, "encoding": {"shape": {"field": "geometry", "type": "geojson"}, "color": {"field": "trade_value", "type": "quantitative", "scale": {"type": "log", "scheme": "orangered"}, "legend": {"title": "USD", "labelColor": "#f0f0f0"}}, "tooltip": [{"field": "country"}, {"field": "trade_value", "format": ",.0f"}]}}
          ]};
        
        // Chart 2: Bar
        const top20 = [...data].sort((a,b) => b.trade_value - a.trade_value).slice(0,20);
        const spec2 = {
          "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
          "title": {"text": "Top 20 Textile Exporters", "color": "#f0f0f0"}, "width": 800, "height": 400, "background": "#1a1a1a",
          "data": {"values": top20}, "mark": {"type": "bar", "cornerRadiusEnd": 3},
          "encoding": {"y": {"field": "country", "type": "nominal", "sort": "-x", "axis": {"labelColor": "#f0f0f0"}}, "x": {"field": "trade_value", "type": "quantitative", "title": "USD", "axis": {"format": "~s", "labelColor": "#aaa"}}, "color": {"field": "trade_value", "scale": {"scheme": "orangered"}}, "tooltip": [{"field": "country"}, {"field": "trade_value", "format": ",.0f"}]}
        };
        
        // Chart 3: Diverging
        const median = data.sort((a,b) => a.trade_value - b.trade_value)[Math.floor(data.length/2)].trade_value;
        const divData = data.slice(0,30).map(d => ({...d, deviation: d.trade_value - median}));
        const spec3 = {
          "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
          "title": {"text": "Deviation from Median Export Value", "color": "#f0f0f0"}, "width": 800, "height": 400, "background": "#1a1a1a",
          "data": {"values": divData}, "mark": "bar",
          "encoding": {"y": {"field": "country", "type": "nominal", "sort": "-x", "axis": {"labelColor": "#f0f0f0"}}, "x": {"field": "deviation", "type": "quantitative", "title": "Above/Below Median (USD)"}, "color": {"condition": {"test": "datum.deviation > 0", "value": "#ff6b35"}, "value": "#4a4a4a"}, "tooltip": [{"field": "country"}, {"field": "deviation", "format": ",.0f"}]}
        };
        
        await vegaEmbed("#chart1_choropleth", spec1, {"actions": false});
        await vegaEmbed("#chart2_ranked_bar", spec2, {"actions": false});
        await vegaEmbed("#chart3_diverging_bar", spec3, {"actions": false});
        console.log("✅ Trade charts loaded");
        
      } catch (error) {
        console.error("Trade charts error:", error);
        document.getElementById('chart1_choropleth').innerHTML = `<p style="color: red; padding: 20px;">Error loading trade data: ${error.message}</p>`;
      }
    }
    
    // Placeholder for other charts (will show "coming soon")
    function showPlaceholders() {
      const charts = ['chart4_lri_map', 'chart5_lri_bar', 'chart6_slope', 'chart7_dotplot', 'chart8_heatmap', 'chart9_dumbbell', 'chart10_stacked_bar', 'chart11_small_multiples', 'chart12_lollipop'];
      charts.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.innerHTML = `<p style="color: #aaa; text-align: center; padding: 50px;">📊 Chart coming soon - data being prepared</p>`;
      });
    }
    
    // Load just the working charts first
    loadTradeCharts();
    showPlaceholders();
  </script>
